<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Matovu | Professional Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-200">

    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white tracking-widest">JAMES MATOVU</h1>
            <div class="hidden md:flex gap-6" id="nav-menu">
                <button onclick="showSection('home')" class="text-xs uppercase tracking-wider">Home</button>
                <button onclick="showSection('expertise')" class="text-xs uppercase tracking-wider">Expertise</button>
                <button onclick="showSection('initiatives')" class="text-xs uppercase tracking-wider">Initiatives</button>
                <button onclick="showSection('codesamples')" class="text-xs uppercase tracking-wider">Code & Data</button>
                <button onclick="showSection('certifications')" class="text-xs uppercase tracking-wider">Certifications</button>
            </div>
        </div>
    </nav>

    <main id="content" class="max-w-7xl mx-auto px-6 py-20 space-y-24">
        <!-- Content injected dynamically -->
    </main>

    <script>
        const sections = {
            home: `
                <header class="space-y-6">
                    <h2 class="text-5xl md:text-7xl font-extrabold text-white tracking-tighter">Statistician & <br>Database Administrator</h2>
                    <p class="text-xl text-slate-400 max-w-2xl">BSc Statistics (CGPA 4.24/5.0). Specializing in large-scale health informatics, SQL-based ETL pipelines, and emergency-response field data collection for the Ministry of Health.</p>
                </header>`,
            expertise: `
                <section class="space-y-8">
                    <h3 class="text-3xl font-bold text-white">Technical Ecosystem</h3>
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                            <h4 class="text-blue-400 font-bold mb-3">Data Engineering & Analytics</h4>
                            <ul class="text-sm text-slate-300 space-y-2">
                                <li>• Expert SQL: Complex joins, window functions, and database schema design</li>
                                <li>• R: Automated report generation (Tidyverse, Ggplot2)</li>
                                <li>• Python: Data manipulation with Pandas</li>
                                <li>• STATA: Statistical modeling</li>
                            </ul>
                        </div>
                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                            <h4 class="text-blue-400 font-bold mb-3">Health Informatics & Field Systems</h4>
                            <ul class="text-sm text-slate-300 space-y-2">
                                <li>• DHIS2 Administration: Aggregate and Event data architectures</li>
                                <li>• REDCap: Advanced project setup, branching logic, and quality rules</li>
                                <li>• Field Tools: ODK, Kobo Toolbox (Offline-first survey design)</li>
                            </ul>
                        </div>
                    </div>
                </section>`,
            initiatives: `
                <section class="space-y-8">
                    <h3 class="text-3xl font-bold text-white">Impactful Field Work</h3>
                    <div class="space-y-6">
                        <div class="bg-slate-900 p-8 rounded-xl border border-l-4 border-blue-600">
                            <h4 class="text-xl font-bold text-white">Ministry of Health Backlog Resolution</h4>
                            <p class="text-slate-400 mt-2">Systematically cleaned 3,500+ records and optimized longitudinal data pipelines across 136 districts, reducing manual workload by 40%.</p>
                        </div>
                        <div class="bg-slate-900 p-8 rounded-xl border border-l-4 border-blue-600">
                            <h4 class="text-xl font-bold text-white">Mpox Outbreak Response (Africa CDC)</h4>
                            <p class="text-slate-400 mt-2">Led field-level deployment for socio-ecological research in high-risk border districts, managing ODK architecture for rapid transmission mapping.</p>
                        </div>
                    </div>
                </section>`,
            codesamples: `
                <section class="space-y-8">
                    <h3 class="text-3xl font-bold text-white">Representative Code</h3>
                    <div class="bg-slate-900 p-6 rounded-xl font-mono text-xs text-blue-300 border border-slate-800">
                        <p class="text-slate-500 mb-2">// SQL: Automated validation rule to flag incomplete surveillance records</p>
                        SELECT facility_id, reporting_week, COUNT(*) as total_records, SUM(CASE WHEN clinical_score IS NULL THEN 1 ELSE 0 END) as incomplete_count FROM surveillance_data GROUP BY facility_id, reporting_week HAVING incomplete_count > 0;
                    </div>
                </section>`,
            certifications: `
                <section class="space-y-8">
                    <h3 class="text-3xl font-bold text-white">Verified Credentials</h3>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                            <h4 class="font-bold text-white">NIH Good Clinical Practice (GCP)</h4>
                            <p class="text-slate-400 text-xs mt-1">NIDA Clinical Trials Network. Expires: 25 August 2028.</p>
                        </div>
                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                            <h4 class="font-bold text-white">DHIS2 Academy Expert (University of Oslo)</h4>
                            <p class="text-slate-400 text-xs mt-1">Certifications: Aggregate Data Capture (GEN-D002), Analysis (GEN-D003), and Event Data Capture (GEN-D006).</p>
                        </div>
                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                            <h4 class="font-bold text-white">Ethics & Code of Conduct</h4>
                            <p class="text-slate-400 text-xs mt-1">African Union (AU Learn). Issued: 23 September 2025.</p>
                        </div>
                    </div>
                </section>`
        };

        function showSection(id) {
            document.getElementById('content').innerHTML = sections[id];
            document.querySelectorAll('#nav-menu button').forEach(btn => {
                btn.classList.toggle('text-blue-400', btn.innerText.toLowerCase().replace(' & data', '') === id);
            });
        }
        showSection('home');
    </script>
</body>
</html>
